{% extends 'base.html' %}
{% block title %}Вход — KaspiBoard{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <h2 class="form-title">Вход в аккаунт</h2>
    
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert--error">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn--primary btn--full">Войти</button>
    </form>
    
    <p style="text-align:center; margin-top:20px;">
      Нет аккаунта? <a href="{% url 'register' %}"><strong>Зарегистрироваться</strong></a>
    </p>
  </div>
</div>
{% endblock %}
